<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Orders — indiaShop Seller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
:root{
  --green:#1ba345;--green-d:#147a34;--green-l:#e8f8ee;
  --orange:#ff6600;--red:#e53935;--blue:#1565c0;
  --yellow:#f9a825;--yellow-l:#fff8e1;
  --bg:#f1f3f6;
  --border:#e0e0e0;--border2:#f0f0f0;
  --t1:#212121;--t2:#555;--t3:#878787;--t4:#aaa;
  --header:#1ba345;
  --r4:4px;--r8:8px;
  --shadow:0 1px 4px rgba(0,0,0,.12);
}
html,body{font-family:'Mukta',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;font-size:14px}
a{text-decoration:none;color:inherit}
button{font-family:'Mukta',sans-serif;cursor:pointer;border:none;outline:none;background:none}
img{display:block;max-width:100%}
.page{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh}

.header{position:sticky;top:0;z-index:100;background:var(--header);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-top{display:flex;align-items:center;gap:10px;padding:10px 14px}
.back-btn{color:#fff;display:flex;align-items:center;cursor:pointer}
.back-btn svg{width:22px;height:22px}
.header-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:#fff;flex:1}
.header-count{font-size:12px;font-weight:600;color:rgba(255,255,255,.75)}

.seller-tabs{background:#fff;border-bottom:1px solid var(--border2);position:sticky;top:52px;z-index:90;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.seller-tabs-scroll{display:flex;overflow-x:auto;padding:0 6px}
.stab{flex-shrink:0;font-size:12px;font-weight:600;color:var(--t3);padding:10px 12px;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer;text-decoration:none}
.stab.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}
.stab svg{width:14px;height:14px}

/* FILTER CHIPS */
.filter-wrap{background:#fff;border-bottom:1px solid var(--border2);position:sticky;top:96px;z-index:85}
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding:8px 10px}
.chip{flex-shrink:0;font-size:12px;font-weight:600;padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:#fff;color:var(--t2);cursor:pointer;white-space:nowrap}
.chip.active{background:var(--green);border-color:var(--green);color:#fff}

.scroll-body{padding:10px 10px 24px}

/* ORDER CARD */
.order-card{background:#fff;border-radius:var(--r8);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.order-card-head{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.order-id{font-size:12px;font-weight:700;font-family:monospace}
.order-date{font-size:11px;color:var(--t3)}

.sbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;flex-shrink:0}
.sbadge.pending   {background:#fff3e0;color:#e65100}
.sbadge.confirmed {background:#e3f2fd;color:#1565c0}
.sbadge.shipped   {background:var(--yellow-l);color:#7b5800}
.sbadge.delivered {background:var(--green-l);color:var(--green-d)}
.sbadge.cancelled {background:#fce4ec;color:#c62828}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sbadge.pending   .sdot{background:#e65100}
.sbadge.confirmed .sdot{background:#1565c0}
.sbadge.shipped   .sdot{background:var(--yellow)}
.sbadge.delivered .sdot{background:var(--green)}
.sbadge.cancelled .sdot{background:var(--red)}

/* ORDER ITEMS */
.order-items-wrap{padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border2)}
.item-thumb{width:52px;height:52px;border-radius:var(--r4);background:var(--bg);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.item-thumb img{width:86%;height:86%;object-fit:contain}
.item-info{flex:1;min-width:0}
.item-name{font-size:12px;font-weight:600;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.item-meta{font-size:11px;color:var(--t3);margin-top:2px}

/* CUSTOMER ROW */
.cust-row{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:12px;color:var(--t2)}
.cust-name{font-weight:700;color:var(--t1);margin-bottom:2px}

/* CARD FOOT */
.order-card-foot{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:#fafafa}
.order-total{font-size:16px;font-weight:800}

/* STATUS BUTTONS */
.status-btns{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;border-top:1px solid var(--border2);background:#fff}
.status-btn{font-size:11px;font-weight:700;padding:6px 12px;border-radius:99px;border:1.5px solid;cursor:pointer;font-family:'Mukta',sans-serif;transition:.15s}
.status-btn.confirm{color:#1565c0;border-color:#1565c0;background:#e3f2fd}
.status-btn.ship{color:#7b5800;border-color:var(--yellow);background:var(--yellow-l)}
.status-btn.deliver{color:var(--green-d);border-color:var(--green);background:var(--green-l)}
.status-btn.cancel{color:var(--red);border-color:var(--red);background:#fce4ec}
.status-btn:active{opacity:.8}
.status-btn:disabled{opacity:.4;cursor:not-allowed}

/* EMPTY */
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-ico{font-size:56px;margin-bottom:14px}
.empty-t{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;margin-bottom:6px}
.empty-s{font-size:13px;color:var(--t3)}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r4)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:#fff;border-radius:var(--r8);margin-bottom:10px;padding:14px;box-shadow:var(--shadow)}

.toast-msg{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:99px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
.toast-msg.show{opacity:1}

@media(min-width:481px){.page{box-shadow:0 0 40px rgba(0,0,0,.1)}}
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-top">
      <button class="back-btn" onclick="location.href='seller-dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-title">My Orders</div>
      <div class="header-count" id="hdr-count"></div>
    </div>
  </header>

  <div class="seller-tabs">
    <div class="seller-tabs-scroll">
      <a class="stab" href="seller-dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
      </a>
      <a class="stab" href="seller-products.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>Products
      </a>
      <a class="stab active" href="seller-orders.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>Orders
      </a>
      <a class="stab" href="seller-add-product.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add Product
      </a>
    </div>
  </div>

  <div class="filter-wrap">
    <div class="filter-scroll">
      <button class="chip active" onclick="setFilter('',this)">All</button>
      <button class="chip" onclick="setFilter('pending',this)">⏳ Pending</button>
      <button class="chip" onclick="setFilter('confirmed',this)">✅ Confirmed</button>
      <button class="chip" onclick="setFilter('shipped',this)">🚚 Shipped</button>
      <button class="chip" onclick="setFilter('delivered',this)">🎉 Delivered</button>
      <button class="chip" onclick="setFilter('cancelled',this)">❌ Cancelled</button>
    </div>
  </div>

  <div class="scroll-body">
    <div id="skel-wrap">
      <div class="skel-card"><div class="skeleton" style="height:14px;width:55%;margin-bottom:10px"></div><div class="skeleton" style="height:52px;margin-bottom:10px"></div><div class="skeleton" style="height:32px;width:60%"></div></div>
      <div class="skel-card"><div class="skeleton" style="height:14px;width:45%;margin-bottom:10px"></div><div class="skeleton" style="height:52px;margin-bottom:10px"></div><div class="skeleton" style="height:32px;width:50%"></div></div>
    </div>
    <div id="orders-list"></div>
    <div id="empty-wrap" style="display:none">
      <div class="empty-wrap">
        <div class="empty-ico">📦</div>
        <div class="empty-t">No Orders Found</div>
        <div class="empty-s">Orders containing your products will appear here.</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-msg" id="toast"></div>

<script src="static/js/main.js"></script>
<script>
if (!Auth.isLoggedIn()) window.location.href = 'login.html';
if (!Auth.isSeller()) window.location.href = 'seller-register.html';

let _allOrders  = [];
let _filterStatus = '';

const urlP = new URLSearchParams(window.location.search);
if (urlP.get('status')) _filterStatus = urlP.get('status');

const STATUS_LABEL = {pending:'Pending',confirmed:'Confirmed',shipped:'Shipped',delivered:'Delivered',cancelled:'Cancelled'};
const esc = s => String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setFilter(status, btn) {
  _filterStatus = status;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

async function loadOrders() {
  try {
    const res  = await api('GET', '/seller/orders?page=1&limit=50');
    const data = res?.data ?? res;
    _allOrders = data?.orders || [];
  } catch(e) {
    _allOrders = [];
  }
  document.getElementById('skel-wrap').style.display = 'none';

  // pre-select filter chip from URL
  if (_filterStatus) {
    document.querySelectorAll('.chip').forEach(c => {
      if (c.textContent.toLowerCase().includes(_filterStatus)) c.classList.add('active');
      else c.classList.remove('active');
    });
  }

  renderOrders();
}

function renderOrders() {
  const list = document.getElementById('orders-list');
  const empty = document.getElementById('empty-wrap');

  const filtered = _filterStatus
    ? _allOrders.filter(o => (o.status||'').toLowerCase() === _filterStatus)
    : _allOrders;

  document.getElementById('hdr-count').textContent = _allOrders.length ? `(${_allOrders.length})` : '';

  if (!filtered.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map((o, idx) => {
    const oid    = o.id || o._id || '';
    const status = (o.status || 'pending').toLowerCase();
    const items  = o.items || [];
    const addr   = o.address || {};
    const date   = o.created_at ? new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '';

    const itemsHtml = items.slice(0, 2).map(it => `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div class="item-thumb">
          <img src="${esc(it.product_image||'https://placehold.co/52x52/f1f3f6/878787?text=?')}"
               onerror="this.src='https://placehold.co/52x52/f1f3f6/878787?text=?'" loading="lazy">
        </div>
        <div class="item-info">
          <div class="item-name">${esc(it.product_name||'Product')}</div>
          <div class="item-meta">Qty: ${it.quantity} × ${formatPrice(it.unit_price||0)}</div>
        </div>
      </div>`).join('') + (items.length > 2 ? `<div style="font-size:11px;color:var(--t3)">+${items.length-2} more item(s)</div>` : '');

    // Action buttons based on current status
    let actionBtns = '';
    if (status === 'pending') {
      actionBtns = `
        <button class="status-btn confirm" onclick="updateStatus('${oid}','confirmed',this)">✅ Confirm</button>
        <button class="status-btn cancel"  onclick="updateStatus('${oid}','cancelled',this)">❌ Cancel</button>`;
    } else if (status === 'confirmed') {
      actionBtns = `
        <button class="status-btn ship"   onclick="updateStatus('${oid}','shipped',this)">🚚 Mark Shipped</button>
        <button class="status-btn cancel" onclick="updateStatus('${oid}','cancelled',this)">❌ Cancel</button>`;
    } else if (status === 'shipped') {
      actionBtns = `
        <button class="status-btn deliver" onclick="updateStatus('${oid}','delivered',this)">🎉 Mark Delivered</button>`;
    }

    return `
      <div class="order-card" style="animation-delay:${idx*.05}s" id="ocard-${esc(oid)}">
        <div class="order-card-head">
          <div>
            <div class="order-id">#${esc(String(oid).slice(-10).toUpperCase())}</div>
            <div class="order-date">${date}</div>
          </div>
          <span class="sbadge ${status}"><span class="sdot"></span>${STATUS_LABEL[status]||status}</span>
        </div>
        <div class="order-items-wrap">${itemsHtml}</div>
        <div class="cust-row">
          <div class="cust-name">👤 ${esc(addr.full_name||'Customer')}</div>
          <div>${esc([addr.city,addr.state,addr.pincode].filter(Boolean).join(', '))}</div>
        </div>
        <div class="order-card-foot">
          <div>
            <div style="font-size:10px;color:var(--t3);font-weight:600">ORDER TOTAL</div>
            <div class="order-total">${formatPrice(o.total_amount||0)}</div>
          </div>
          <div style="font-size:11px;color:var(--t3)">${items.length} item${items.length!==1?'s':''}</div>
        </div>
        ${actionBtns ? `<div class="status-btns">${actionBtns}</div>` : ''}
      </div>`;
  }).join('');
}

async function updateStatus(orderId, newStatus, btn) {
  if (!confirm(`Mark order as ${newStatus}?`)) return;
  btn.disabled = true;
  btn.textContent = '⏳';
  try {
    await api('PATCH', `/seller/orders/${orderId}/status`, { status: newStatus });
    const o = _allOrders.find(x => (x.id||x._id) === orderId);
    if (o) o.status = newStatus;
    showToast(`Order marked as ${newStatus} ✓`);
    renderOrders();
  } catch(e) {
    showToast('Failed to update status');
    btn.disabled = false;
  }
}

loadOrders();
</script>
</body>
</html>
