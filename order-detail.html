<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Detail — indiaShop</title>
<link rel="stylesheet" href="static/css/style.css">
<link rel="stylesheet" href="static/css/nav.css">
<style>
.tracker { display: flex; align-items: center; margin: 20px 0; }
.track-step { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
.track-step::after { content: ''; position: absolute; left: 50%; top: 18px; width: 100%; height: 2px; background: var(--border); z-index: 0; }
.track-step:last-child::after { display: none; }
.track-dot { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; transition: all 0.3s; }
.track-dot.done { background: var(--success); border-color: var(--success); color: #fff; }
.track-dot.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.track-label { font-size: 11px; font-weight: 600; color: var(--text3); margin-top: 6px; text-align: center; }
.track-step.done .track-label { color: var(--success); }
.track-step.active .track-label { color: var(--primary); }
.info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-row span:first-child { color: var(--text3); }
</style>
</head>
<body>
<nav class="navbar"><div class="container"></div></nav>
<div class="page-content">
<div class="container" style="max-width:700px">

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <a href="orders.html" style="color:var(--text3)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></a>
    <div class="fw-700 fs-18">Order Details</div>
  </div>

  <div id="order-wrap">
    <div class="card p-4 mb-3"><div class="skeleton" style="height:120px"></div></div>
  </div>

</div>
</div>
<nav class="bottom-nav"></nav>

<script src="../static/js/main.js"></script>
<script>
  if (!Auth.isLoggedIn()) window.location.href = 'login.html';
  buildNavbar('account');

  const oid = new URLSearchParams(window.location.search).get('id');
  if (!oid) window.location.href = 'orders.html';

  const statusSteps = ['pending', 'processing', 'shipped', 'delivered'];
  const statusLabel = { pending: 'Pending', processing: 'Processing', shipped: 'Shipped', delivered: 'Delivered', cancelled: 'Cancelled' };
  const statusClass = { processing: 'primary', shipped: 'warning', delivered: 'success', cancelled: 'danger', pending: 'gray' };

  async function loadOrder() {
    try {
      const order = await api('GET', `/orders/${oid}`);
      document.title = `Order #${order.id} — indiaShop`;

      const stepIdx = statusSteps.indexOf(order.status);
      const trackerHTML = order.status === 'cancelled' ? `<div style="background:#fce4e4;color:var(--danger);border-radius:var(--radius);padding:14px;text-align:center;font-weight:600;margin:16px 0">❌ Order Cancelled</div>` : `
        <div class="tracker">
          ${statusSteps.map((s, i) => {
            const done = i < stepIdx;
            const active = i === stepIdx;
            return `<div class="track-step${done?' done':active?' active':''}">
              <div class="track-dot${done?' done':active?' active':''}">
                ${done ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : `<span style="font-size:11px;font-weight:700">${i+1}</span>`}
              </div>
              <div class="track-label">${statusLabel[s]}</div>
            </div>`;
          }).join('')}
        </div>`;

      document.getElementById('order-wrap').innerHTML = `
        <div class="card p-4 mb-3">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
            <div class="fw-700 fs-16">Order #${order.id}</div>
            <span class="badge badge-${statusClass[order.status]||'gray'}">${statusLabel[order.status]||order.status}</span>
          </div>
          ${trackerHTML}
          <div class="info-row"><span>Ordered On</span><span>${new Date(order.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</span></div>
          <div class="info-row"><span>Payment</span><span>${(order.payment_method||'cod').toUpperCase()}</span></div>
        </div>

        <div class="card mb-3">
          <div style="padding:12px 16px;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)">Items</div>
          ${(order.items||[]).map(item => `
            <div style="display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer" onclick="window.location='product-detail.html?id=${item.product_id}'">
              <img src="${item.image||'https://placehold.co/60x60?text=Img'}" style="width:60px;height:60px;object-fit:contain;background:var(--bg);border-radius:var(--radius)">
              <div style="flex:1">
                <div style="font-size:14px;font-weight:500;margin-bottom:4px">${item.name}</div>
                <div style="font-size:12px;color:var(--text3)">Qty: ${item.qty}</div>
                <div style="font-size:14px;font-weight:700">${formatPrice(item.price * item.qty)}</div>
              </div>
            </div>`).join('')}
          <div style="padding:14px 16px;display:flex;justify-content:flex-end;font-size:15px;font-weight:700">Total: ${formatPrice(order.total_amount)}</div>
        </div>

        ${order.address ? `
        <div class="card p-4 mb-3">
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Delivery Address</div>
          <div style="font-size:14px;font-weight:600">${order.address.name} · ${order.address.phone}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:4px">${order.address.address_line}, ${order.address.city}, ${order.address.state} — ${order.address.pincode}</div>
        </div>` : ''}

        ${order.status !== 'cancelled' && order.status !== 'delivered' ? `
        <button class="btn btn-outline w-100" style="color:var(--danger);border-color:var(--danger)" onclick="cancelOrder(${order.id})">Cancel Order</button>` : ''}
      `;
    } catch {
      document.getElementById('order-wrap').innerHTML = `<div class="empty-state"><p>Order not found.</p><a href="orders.html" class="btn btn-outline">Back to Orders</a></div>`;
    }
  }

  async function cancelOrder(id) {
    if (!confirm('Cancel this order?')) return;
    try {
      await api('PUT', `/orders/${id}/cancel`);
      toast('Order cancelled', 'success');
      loadOrder();
    } catch(e) { toast(e.message, 'error'); }
  }

  loadOrder();
</script>
</body>
</html>
