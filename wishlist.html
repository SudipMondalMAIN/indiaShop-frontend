<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — indiaShop</title>
<link rel="stylesheet" href="static/css/style.css">
<link rel="stylesheet" href="static/css/nav.css">
<style>
.wish-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; position: relative; }
.wish-remove { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); z-index: 1; }
.wish-img { aspect-ratio: 1; background: var(--bg); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
.wish-img img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
.wish-info { padding: 10px 12px 12px; }
.wish-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; cursor: pointer; }
.wish-price { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
</style>
</head>
<body>
<nav class="navbar"><div class="container"></div></nav>
<div class="page-content">
<div class="container" style="max-width:900px">

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <a href="account.html" style="color:var(--text3)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></a>
    <div class="fw-700 fs-18">My Wishlist <span id="wish-count" class="text-muted fw-500 fs-14"></span></div>
  </div>

  <div class="grid-4" id="wish-grid"></div>
  <div id="wish-empty" class="empty-state" style="display:none">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    <p>Your wishlist is empty</p>
    <a href="products.html" class="btn btn-primary">Discover Products</a>
  </div>

</div>
</div>
<nav class="bottom-nav"></nav>

<script src="../static/js/main.js"></script>
<script>
  if (!Auth.isLoggedIn()) window.location.href = 'login.html';
  buildNavbar('account');

  // Wishlist stored locally
  const Wish = {
    get: () => { try { return JSON.parse(localStorage.getItem('is_wish')) || []; } catch { return []; } },
    save: (items) => localStorage.setItem('is_wish', JSON.stringify(items)),
    remove: (id) => { Wish.save(Wish.get().filter(i => i.id !== id)); },
    toggle: (product) => {
      const items = Wish.get();
      const idx = items.findIndex(i => i.id === product.id);
      if (idx >= 0) { items.splice(idx, 1); Wish.save(items); return false; }
      else { items.push(product); Wish.save(items); return true; }
    },
    has: (id) => Wish.get().some(i => i.id === id),
  };

  function renderWishlist() {
    const items = Wish.get();
    const grid = document.getElementById('wish-grid');
    if (!items.length) {
      grid.innerHTML = '';
      document.getElementById('wish-empty').style.display = 'flex';
      document.getElementById('wish-count').textContent = '';
      return;
    }
    document.getElementById('wish-empty').style.display = 'none';
    document.getElementById('wish-count').textContent = `(${items.length})`;
    const disc = (p) => p.original_price > p.price ? Math.round((1 - p.price / p.original_price) * 100) : 0;
    grid.innerHTML = items.map(p => `
      <div class="wish-card">
        <div class="wish-remove" onclick="removeWish(${p.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <div class="wish-img" onclick="window.location='product-detail.html?id=${p.id}'">
          <img src="${p.image || 'https://placehold.co/200x200?text=Img'}" alt="${p.name}">
          ${disc(p) ? `<div class="product-disc-badge">${disc(p)}% off</div>` : ''}
        </div>
        <div class="wish-info">
          <div class="wish-name" onclick="window.location='product-detail.html?id=${p.id}'">${p.name}</div>
          <div class="wish-price">${formatPrice(p.price)}</div>
          <button class="btn btn-accent btn-block btn-sm" onclick="addToCartFromWish(${JSON.stringify(p).replace(/"/g,'&quot;')})">Add to Cart</button>
        </div>
      </div>`).join('');
  }

  function removeWish(id) {
    Wish.remove(id);
    renderWishlist();
    toast('Removed from wishlist');
  }

  function addToCartFromWish(p) {
    Cart.add(p, 1);
  }

  renderWishlist();
</script>
</body>
</html>
