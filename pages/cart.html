<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — indiaShop</title>
<link rel="stylesheet" href="../static/css/style.css">
<link rel="stylesheet" href="../static/css/nav.css">
<style>
.cart-layout { display: flex; gap: 16px; align-items: flex-start; }
.cart-items { flex: 1; min-width: 0; }
.cart-summary { width: 300px; flex-shrink: 0; position: sticky; top: 70px; }

.cart-item {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; margin-bottom: 10px; display: flex; gap: 14px;
  box-shadow: var(--shadow-sm);
}
.cart-item-img { width: 80px; height: 80px; object-fit: contain; border-radius: var(--radius); background: var(--bg); padding: 4px; flex-shrink: 0; cursor: pointer; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; cursor: pointer; }
.cart-item-name:hover { color: var(--primary); }
.cart-item-price { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.cart-item-actions { display: flex; align-items: center; gap: 12px; }
.qty-row { display: flex; align-items: center; gap: 8px; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 2px 4px; }
.qty-row button { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--primary); font-weight: 700; }
.qty-row span { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
.remove-btn { font-size: 13px; color: var(--danger); font-weight: 500; }

.summary-card { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.summary-title { font-size: 14px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; }
.summary-row.total { font-weight: 700; font-size: 16px; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }
.summary-saving { background: #e8f5e9; color: var(--success); font-size: 13px; font-weight: 500; padding: 8px 12px; border-radius: var(--radius); margin-bottom: 16px; }

@media (max-width: 768px) {
  .cart-layout { flex-direction: column; }
  .cart-summary { width: 100%; position: static; }
}
</style>
</head>
<body>
<nav class="navbar"><div class="container"></div></nav>
<div class="page-content">
<div class="container">

  <div class="fw-700 fs-18 mb-3">My Cart <span id="cart-count-text" class="text-muted fw-500 fs-14"></span></div>

  <div id="empty-cart" class="empty-state" style="display:none">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    <p>Your cart is empty</p>
    <a href="../index.html" class="btn btn-primary">Start Shopping</a>
  </div>

  <div class="cart-layout" id="cart-layout">
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-summary">
      <div class="summary-card">
        <div class="summary-title">Price Details</div>
        <div class="summary-row"><span>Price (<span id="s-count">0</span> items)</span><span id="s-mrp">₹0</span></div>
        <div class="summary-row"><span>Discount</span><span class="text-success" id="s-discount">-₹0</span></div>
        <div class="summary-row"><span>Delivery</span><span class="text-success">FREE</span></div>
        <div class="summary-row total"><span>Total Amount</span><span id="s-total">₹0</span></div>
        <div class="summary-saving" id="s-saving" style="display:none">You save ₹<span id="s-save-amt">0</span> on this order 🎉</div>
        <button class="btn btn-accent btn-block btn-lg" onclick="placeOrder()">Place Order</button>
      </div>
    </div>
  </div>

</div>
</div>
<nav class="bottom-nav"></nav>

<script src="../static/js/main.js"></script>
<script>
  buildNavbar('cart');

  function renderCart() {
    const items = Cart.get();
    const el = document.getElementById('cart-items');

    if (!items.length) {
      document.getElementById('empty-cart').style.display = 'block';
      document.getElementById('cart-layout').style.display = 'none';
      document.getElementById('cart-count-text').textContent = '';
      return;
    }

    document.getElementById('empty-cart').style.display = 'none';
    document.getElementById('cart-layout').style.display = 'flex';
    document.getElementById('cart-count-text').textContent = `(${items.length})`;

    el.innerHTML = items.map(item => `
      <div class="cart-item">
        <img class="cart-item-img" src="${item.image || 'https://placehold.co/80x80?text=Img'}" alt="${item.name}" onclick="window.location='product-detail.html?id=${item.id}'">
        <div class="cart-item-info">
          <div class="cart-item-name" onclick="window.location='product-detail.html?id=${item.id}'">${item.name}</div>
          <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
          <div class="cart-item-actions">
            <div class="qty-row">
              <button onclick="updateQty(${item.id}, ${item.qty - 1})">−</button>
              <span>${item.qty}</span>
              <button onclick="updateQty(${item.id}, ${item.qty + 1})">+</button>
            </div>
            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
          </div>
        </div>
      </div>
    `).join('');

    // Summary
    const total = Cart.total();
    const mrp = items.reduce((s, i) => s + (i.original_price || i.price) * i.qty, 0);
    const saved = mrp - total;
    document.getElementById('s-count').textContent = items.length;
    document.getElementById('s-mrp').textContent = formatPrice(mrp);
    document.getElementById('s-discount').textContent = `-${formatPrice(saved)}`;
    document.getElementById('s-total').textContent = formatPrice(total);
    if (saved > 0) {
      document.getElementById('s-saving').style.display = 'block';
      document.getElementById('s-save-amt').textContent = saved.toLocaleString('en-IN');
    }
  }

  function updateQty(id, qty) { Cart.update(id, qty); renderCart(); }
  function removeItem(id) { Cart.remove(id); renderCart(); toast('Removed from cart'); }

  async function placeOrder() {
    if (!Auth.isLoggedIn()) return window.location.href = 'login.html?next=cart.html';
    const items = Cart.get();
    if (!items.length) return;
    try {
      const data = await api('POST', '/orders', { items: items.map(i => ({ product_id: i.id, qty: i.qty })) });
      Cart.clear();
      toast('Order placed!', 'success');
      setTimeout(() => window.location.href = 'orders.html', 800);
    } catch(e) { toast(e.message, 'error'); }
  }

  renderCart();
</script>
</body>
</html>
