<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — indiaShop</title>
<link rel="stylesheet" href="../static/css/style.css">
<link rel="stylesheet" href="../static/css/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-banner">
    <div>
      <h1>Reset Your<br>Password</h1>
      <p>Enter your email and we'll send you an OTP to reset your password.</p>
    </div>
  </div>
  <div class="auth-form-wrap">
    <div class="auth-logo">india<span>Shop</span></div>

    <div id="step-email">
      <div class="auth-title">Forgot Password?</div>
      <div class="auth-sub">We'll send an OTP to your email</div>
      <div class="auth-form">
        <div class="input-wrap">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <button class="btn btn-primary btn-block btn-lg" id="send-otp-btn" onclick="sendOTP()">Send OTP</button>
        <div class="auth-footer"><a href="login.html">← Back to login</a></div>
      </div>
    </div>

    <div id="step-otp" style="display:none">
      <button onclick="showStep('email')" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Back
      </button>
      <div class="auth-title">Enter OTP</div>
      <div class="auth-sub" id="otp-sub">Sent to your email</div>
      <div class="auth-form">
        <div class="otp-inputs">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
        </div>
        <div class="otp-timer" id="otp-timer-wrap">Resend in <span id="otp-timer">60s</span></div>
        <button class="btn btn-primary btn-block btn-lg" id="verify-btn" onclick="verifyOTP()">Verify OTP</button>
      </div>
    </div>

    <div id="step-new-password" style="display:none">
      <div class="auth-title">Set New Password</div>
      <div class="auth-sub">Choose a strong password</div>
      <div class="auth-form">
        <div class="input-wrap">
          <label>New password</label>
          <div class="pw-wrap">
            <input type="password" id="new-password" placeholder="Min. 6 characters" autocomplete="new-password">
            <button type="button" class="pw-toggle" onclick="togglePw('new-password', this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="input-wrap">
          <label>Confirm password</label>
          <div class="pw-wrap">
            <input type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password">
            <button type="button" class="pw-toggle" onclick="togglePw('confirm-password', this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="btn btn-primary btn-block btn-lg" id="reset-btn" onclick="resetPassword()">Reset Password</button>
      </div>
    </div>
  </div>
</div>

<style>
.back-btn {
  color: var(--primary, #2874f0);
  font-size: 13px; font-weight: 600;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer; padding: 0;
}
.pw-wrap { position: relative; }
.pw-wrap input { width: 100%; padding-right: 44px; box-sizing: border-box; }
.pw-toggle {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: #888; padding: 0; display: flex; align-items: center;
}
.pw-toggle:hover { color: #333; }
</style>

<script src="../static/js/main.js"></script>
<script>
  const ALL_STEPS = ['email', 'otp', 'new-password'];
  function showStep(name) {
    ALL_STEPS.forEach(s =>
      document.getElementById('step-' + s).style.display = 'none'
    );
    document.getElementById('step-' + name).style.display = '';
  }

  // ── Step 1: Send OTP ───────────────────────────────────────────────────────
  async function sendOTP() {
    const email = document.getElementById('email').value.trim();
    if (!email) return toast('Enter your email', 'error');
    const btn = document.getElementById('send-otp-btn');
    btnLoading(btn, true);
    try {
      // FIX Bug 2: send "purpose" instead of "type"
      await api('POST', '/auth/send-otp', { email, purpose: 'reset_password' });
      document.getElementById('otp-sub').textContent = `Sent to ${email}`;
      showStep('otp');
      initOTPInputs();
      startOTPTimer(60);
      toast('OTP sent!', 'success');
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btnLoading(btn, false);
    }
  }

  // ── Step 2: Verify OTP ─────────────────────────────────────────────────────
  let _resetOTP = '';
  async function verifyOTP() {
    const email = document.getElementById('email').value.trim();
    const otp   = getOTPValue();
    if (otp.length < 6) return toast('Enter 6-digit OTP', 'error');
    const btn = document.getElementById('verify-btn');
    btnLoading(btn, true);
    try {
      // FIX Bug 2: send "purpose" instead of "type"
      await api('POST', '/auth/verify-otp', { email, otp, purpose: 'reset_password' });
      _resetOTP = otp;
      showStep('new-password');
      toast('OTP verified!', 'success');
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btnLoading(btn, false);
    }
  }

  // ── Step 3: Reset Password ─────────────────────────────────────────────────
  async function resetPassword() {
    const newPw  = document.getElementById('new-password').value;
    const confPw = document.getElementById('confirm-password').value;
    if (newPw.length < 6)  return toast('Password must be at least 6 characters', 'error');
    if (newPw !== confPw)  return toast('Passwords do not match', 'error');
    const email = document.getElementById('email').value.trim();
    const btn   = document.getElementById('reset-btn');
    btnLoading(btn, true);
    try {
      // FIX Bug 5 + Bug 6: use "password" field name (backend reads data.get("password"))
      await api('POST', '/auth/reset-password', {
        email,
        otp: _resetOTP,
        password: newPw,
      });
      toast('Password reset! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 1200);
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btnLoading(btn, false);
    }
  }

  // ── Resend OTP ─────────────────────────────────────────────────────────────
  async function resendOTP() {
    const email = document.getElementById('email').value.trim();
    try {
      // FIX Bug 2: send "purpose" instead of "type"
      await api('POST', '/auth/send-otp', { email, purpose: 'reset_password' });
      toast('OTP resent!', 'success');
      document.getElementById('otp-timer-wrap').innerHTML =
        `Resend in <span id="otp-timer">60s</span>`;
      startOTPTimer(60);
    } catch (e) { toast(e.message, 'error'); }
  }

  // ── Password visibility toggle ─────────────────────────────────────────────
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    inp.type  = inp.type === 'password' ? 'text' : 'password';
    btn.style.color = inp.type === 'text' ? 'var(--primary, #2874f0)' : '#888';
  }

  // Enter key on email
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendOTP();
  });
</script>
</body>
</html>
