<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Orders — indiaShop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700;800&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
:root{
  --green:#1ba345;--green-d:#147a34;--green-l:#e8f8ee;
  --orange:#ff6600;--red:#e53935;--blue:#1565c0;
  --yellow:#f9a825;--yellow-l:#fff8e1;
  --bg:#f1f3f6;
  --border:#e0e0e0;--border2:#f0f0f0;
  --t1:#212121;--t2:#555;--t3:#878787;--t4:#aaa;
  --header:#1ba345;
  --r4:4px;--r8:8px;--r12:12px;
  --shadow:0 1px 4px rgba(0,0,0,.12);
  --shadow-md:0 2px 10px rgba(0,0,0,.1);
}
html,body{font-family:'Mukta',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;font-size:14px}
a{text-decoration:none;color:inherit}
button{font-family:'Mukta',sans-serif;cursor:pointer;border:none;outline:none;background:none}
img{display:block;max-width:100%}
.page{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:var(--header);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-top{display:flex;align-items:center;gap:10px;padding:10px 14px}
.back-btn{color:#fff;display:flex;align-items:center;cursor:pointer;padding:2px}
.back-btn svg{width:22px;height:22px}
.header-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:#fff;flex:1}
.header-count{font-family:'Mukta',sans-serif;font-size:12px;font-weight:600;color:rgba(255,255,255,.75)}

/* ── TABS ── */
.tabs-wrap{background:#fff;border-bottom:1px solid var(--border2);position:sticky;top:52px;z-index:90;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tabs-scroll{display:flex;overflow-x:auto;gap:0;padding:0 8px}
.tab-btn{flex-shrink:0;font-family:'Mukta',sans-serif;font-size:13px;font-weight:600;color:var(--t3);padding:10px 14px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}

/* ── SCROLL BODY ── */
.scroll-body{padding:10px 10px 24px}

/* ── ORDER CARD ── */
.order-card{
  background:#fff;border-radius:var(--r8);margin-bottom:10px;
  box-shadow:var(--shadow);overflow:hidden;
  cursor:pointer;
  animation:fadeUp .22s ease both;
  transition:box-shadow .15s,transform .12s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.order-card:active{transform:scale(.985);box-shadow:var(--shadow-md)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── CARD HEAD ── */
.order-card-head{
  padding:10px 14px;
  background:var(--bg);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.order-id-wrap{display:flex;flex-direction:column;gap:1px}
.order-id{font-size:12px;font-weight:700;color:var(--t1);font-family:monospace,sans-serif}
.order-date{font-size:11px;color:var(--t3)}

/* ── STATUS BADGE ── */
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;flex-shrink:0}
.status-badge.pending    {background:#fff3e0;color:#e65100}
.status-badge.confirmed  {background:#e3f2fd;color:#1565c0}
.status-badge.processing {background:#e3f2fd;color:#1565c0}
.status-badge.shipped    {background:var(--yellow-l);color:#7b5800}
.status-badge.delivered  {background:var(--green-l);color:var(--green-d)}
.status-badge.cancelled  {background:#fce4ec;color:#c62828}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-badge.pending    .status-dot{background:#e65100}
.status-badge.confirmed  .status-dot{background:#1565c0}
.status-badge.processing .status-dot{background:#1565c0}
.status-badge.shipped    .status-dot{background:var(--yellow)}
.status-badge.delivered  .status-dot{background:var(--green)}
.status-badge.cancelled  .status-dot{background:var(--red)}

/* ── PRODUCT THUMBNAILS ── */
.order-thumb-strip{padding:14px 14px 6px;display:flex;align-items:flex-start;gap:8px}
.thumb-img{
  width:64px;height:64px;flex-shrink:0;
  background:var(--bg);border-radius:var(--r4);
  overflow:hidden;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
}
.thumb-img img{width:86%;height:86%;object-fit:contain}
.thumb-more{
  width:64px;height:64px;flex-shrink:0;
  background:#f4f6fa;border-radius:var(--r4);
  border:1.5px solid var(--border2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:var(--green);line-height:1;gap:2px;
}
.thumb-more span{font-size:10px;font-weight:600;color:var(--t3)}

/* ── ITEM COUNT ── */
.order-item-count{font-size:12px;color:var(--t3);padding:0 14px 10px}
.order-item-count strong{color:var(--t2);font-weight:700}

/* ── CARD FOOTER ── */
.order-card-foot{
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:#fafafa;border-top:1px solid var(--border2);
}
.order-total-group{display:flex;flex-direction:column;gap:1px}
.order-total-label{font-size:11px;color:var(--t3);font-weight:600}
.order-total-val{font-size:16px;font-weight:800;color:var(--t1)}
.order-actions{display:flex;gap:8px;align-items:center}
.btn-cancel{font-size:12px;font-weight:700;color:var(--red);background:#fce4ec;padding:6px 12px;border-radius:99px;border:none;cursor:pointer;font-family:'Mukta',sans-serif}
.btn-cancel:active{opacity:.8}
.btn-track{font-size:12px;font-weight:700;color:var(--blue);background:#e3f2fd;padding:6px 12px;border-radius:99px;border:none;cursor:pointer;font-family:'Mukta',sans-serif}
.btn-track:active{opacity:.8}
.card-arrow{color:var(--t4);display:flex;align-items:center}
.card-arrow svg{width:16px;height:16px}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r4)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:#fff;border-radius:var(--r8);margin-bottom:10px;padding:14px;box-shadow:var(--shadow)}

/* ── EMPTY ── */
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-ico{font-size:64px;margin-bottom:16px}
.empty-t{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--t1);margin-bottom:6px}
.empty-s{font-size:13px;color:var(--t3);margin-bottom:24px;line-height:1.5}
.btn-shop{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;font-size:14px;font-weight:700;padding:12px 28px;border-radius:var(--r4);cursor:pointer;border:none;box-shadow:0 2px 8px rgba(27,163,69,.35);font-family:'Baloo 2',cursive}

/* ── TOAST ── */
.toast-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:99px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
.toast-msg.show{opacity:1}

@media(min-width:481px){.page{box-shadow:0 0 40px rgba(0,0,0,.1)}}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-title">My Orders</div>
      <div class="header-count" id="hdr-count"></div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs-wrap">
    <div class="tabs-scroll">
      <button class="tab-btn active" onclick="setTab('all',this)">All</button>
      <button class="tab-btn" onclick="setTab('pending',this)">Pending</button>
      <button class="tab-btn" onclick="setTab('confirmed',this)">Confirmed</button>
      <button class="tab-btn" onclick="setTab('shipped',this)">Shipped</button>
      <button class="tab-btn" onclick="setTab('delivered',this)">Delivered</button>
      <button class="tab-btn" onclick="setTab('cancelled',this)">Cancelled</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="scroll-body" id="scroll-body">
    <!-- skeleton -->
    <div id="skel-wrap">
      <div class="skel-card">
        <div class="skeleton" style="height:14px;width:50%;margin-bottom:14px"></div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <div class="skeleton" style="width:64px;height:64px;border-radius:4px;flex-shrink:0"></div>
          <div class="skeleton" style="width:64px;height:64px;border-radius:4px;flex-shrink:0"></div>
          <div class="skeleton" style="width:64px;height:64px;border-radius:4px;flex-shrink:0"></div>
        </div>
        <div class="skeleton" style="height:12px;width:30%;margin-bottom:12px"></div>
        <div style="display:flex;justify-content:space-between">
          <div class="skeleton" style="height:18px;width:25%"></div>
          <div class="skeleton" style="height:28px;width:20%;border-radius:99px"></div>
        </div>
      </div>
      <div class="skel-card">
        <div class="skeleton" style="height:14px;width:45%;margin-bottom:14px"></div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <div class="skeleton" style="width:64px;height:64px;border-radius:4px;flex-shrink:0"></div>
          <div class="skeleton" style="width:64px;height:64px;border-radius:4px;flex-shrink:0"></div>
        </div>
        <div class="skeleton" style="height:12px;width:25%;margin-bottom:12px"></div>
        <div style="display:flex;justify-content:space-between">
          <div class="skeleton" style="height:18px;width:22%"></div>
        </div>
      </div>
    </div>
    <!-- orders list -->
    <div id="orders-list"></div>
    <!-- empty -->
    <div id="empty-wrap" style="display:none">
      <div class="empty-wrap">
        <div class="empty-ico">📦</div>
        <div class="empty-t">No Orders Yet</div>
        <div class="empty-s">You haven't placed any orders.<br>Start shopping to see them here!</div>
        <button class="btn-shop" onclick="location.href='../index.html'">🛍️ Start Shopping</button>
      </div>
    </div>
  </div>

</div>

<div class="toast-msg" id="toast"></div>

<script src="static/js/main.js"></script>
<script>
if (!Auth.isLoggedIn()) window.location.href = 'login.html?next=orders.html';

const fmt = n => formatPrice(n);
const esc = s => escapeHtml ? escapeHtml(s) : String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');

let _activeTab = 'all';
let _allOrders = [];

const STATUS_LABEL = {
  pending:    'Pending',
  confirmed:  'Confirmed',
  processing: 'Processing',
  shipped:    'Shipped',
  delivered:  'Delivered',
  cancelled:  'Cancelled',
};

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── TAB ───────────────────────────────────────────────────────────────────────
function setTab(status, btn) {
  _activeTab = status;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadOrders() {
  try {
    const res = await api('GET', '/orders');
    _allOrders = Array.isArray(res)
      ? res
      : (res?.data ?? res?.orders ?? res ?? []);
    if (!Array.isArray(_allOrders)) _allOrders = [];
  } catch (err) {
    console.error('Failed to load orders:', err);
    _allOrders = [];
  }
  document.getElementById('skel-wrap').style.display = 'none';
  renderOrders();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderOrders() {
  const list      = document.getElementById('orders-list');
  const emptyWrap = document.getElementById('empty-wrap');

  const filtered = _activeTab === 'all'
    ? _allOrders
    : _allOrders.filter(o => {
        const s = (o.status || '').toLowerCase();
        if (_activeTab === 'confirmed') return s === 'confirmed' || s === 'processing';
        return s === _activeTab;
      });

  document.getElementById('hdr-count').textContent =
    _allOrders.length ? `(${_allOrders.length})` : '';

  if (!filtered.length) {
    list.innerHTML = '';
    emptyWrap.style.display = 'block';
    return;
  }
  emptyWrap.style.display = 'none';

  list.innerHTML = filtered.map((o, idx) => {
    const orderId   = o.id || o._id || o.order_id || '';
    const status    = (o.status || 'pending').toLowerCase();
    const label     = STATUS_LABEL[status] || status;
    const date      = o.created_at
      ? new Date(o.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
      : '';
    const items     = o.items || [];
    const total     = o.total_amount ?? o.total ?? 0;
    const canCancel = status === 'pending' || status === 'confirmed';

    // ── Thumbnail strip: max 4 images, rest as +N ──────────────────────────
    const MAX_SHOW  = 4;
    const showItems = items.slice(0, MAX_SHOW);
    const extra     = items.length - MAX_SHOW;

    const thumbsHtml = showItems.map(item => {
      const img  = item.product_image || item.image || item.primary_image || '';
      const name = item.product_name  || item.name || 'Product';
      return `<div class="thumb-img">
        <img src="${esc(img || 'https://placehold.co/64x64/f1f3f6/878787?text=?')}"
             alt="${esc(name)}"
             onerror="this.src='https://placehold.co/64x64/f1f3f6/878787?text=?'"
             loading="lazy">
      </div>`;
    }).join('');

    const extraHtml = extra > 0
      ? `<div class="thumb-more">+${extra}<span>more</span></div>`
      : '';

    const itemLabel = items.length === 1
      ? '<strong>1 item</strong>'
      : `<strong>${items.length} items</strong>`;

    return `
      <div class="order-card" onclick="goDetail('${esc(String(orderId))}',event)" style="animation-delay:${idx * 0.06}s">

        <!-- Head -->
        <div class="order-card-head">
          <div class="order-id-wrap">
            <div class="order-id">#${esc(String(orderId).slice(-10).toUpperCase())}</div>
            <div class="order-date">${date}</div>
          </div>
          <span class="status-badge ${status}">
            <span class="status-dot"></span>${label}
          </span>
        </div>

        <!-- Thumbnails -->
        <div class="order-thumb-strip">
          ${thumbsHtml}${extraHtml}
        </div>

        <!-- Item count -->
        <div class="order-item-count">${itemLabel}</div>

        <!-- Footer -->
        <div class="order-card-foot">
          <div class="order-total-group">
            <div class="order-total-label">Order Total</div>
            <div class="order-total-val">${fmt(total)}</div>
          </div>
          <div class="order-actions">
            ${canCancel ? `<button class="btn-cancel" onclick="cancelOrder('${esc(String(orderId))}',event)">Cancel</button>` : ''}
            ${status === 'shipped' ? `<button class="btn-track" onclick="event.stopPropagation();showToast('Tracking coming soon!')">Track</button>` : ''}
            <div class="card-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>
        </div>

      </div>`;
  }).join('');
}

// ── NAVIGATE TO DETAIL ────────────────────────────────────────────────────────
function goDetail(orderId, e) {
  if (e.target.closest('.btn-cancel') || e.target.closest('.btn-track')) return;
  location.href = 'order-detail.html?id=' + encodeURIComponent(orderId);
}

// ── CANCEL ────────────────────────────────────────────────────────────────────
async function cancelOrder(orderId, e) {
  e.stopPropagation();
  if (!confirm('Cancel this order?')) return;
  try {
    await api('DELETE', '/orders/' + orderId);
    showToast('Order cancelled');
    const o = _allOrders.find(x => (x.id || x._id || x.order_id) === orderId);
    if (o) o.status = 'cancelled';
    renderOrders();
  } catch (err) {
    console.error('Cancel failed:', err);
    showToast('Could not cancel. Please try again.');
  }
}

loadOrders();
</script>
</body>
</html>
